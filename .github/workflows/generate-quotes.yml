name: Generate AI Quotes

on:
  schedule:
    - cron: "30 2 * * *"

  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Render service
        run: |
          echo "Waking Render service..."
          curl --fail --show-error --silent --max-time 120 \
            "${{ secrets.BACKEND_BASE_URL }}/"

      - name: Wait for Render warmup
        run: sleep 100

      - name: Generate quotes
        run: |
          echo "Calling protected generate endpoint..."

          response_file="response.json"
          status_code=$(curl --show-error --silent \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request POST \
            --header "X-Admin-Key: ${{ secrets.ADMIN_API_KEY }}" \
            "${{ secrets.BACKEND_BASE_URL }}/api/generate?count=15")

          echo "HTTP status: $status_code"
          echo "Response body:"
          cat "$response_file"
          echo ""

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "Generate endpoint failed. Check the response body above and Render logs."
            exit 1
          fi

      - name: Upload response on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: generate-response
          path: response.json